# This workflow will check pull request and run tests

name: Pull Request Check

on:
  pull_request:
    branches:
      - main

jobs:
  pr-labler:
    permissions:
      contents: read
      pull-requests: write
    name: 🏷️ PR Labeler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
  build:
    permissions:
      checks: write
      pull-requests: write
    name: 🛂 Pull Request Check
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository ⚙️
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python ⚙️
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip' # caching pip dependencies
        
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
  
      - name: Install dependencies ⚙️ 
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
  
      - name: Build and test 🏗️
        run: |
          pip install httpx pytest pytest-cov coverage
          pytest -v --doctest-modules --junitxml=junit/test-results.xml --cov=trading_calendar --cov-report=xml --cov-report=html
  
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          files: |
            junit/test-results.xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
